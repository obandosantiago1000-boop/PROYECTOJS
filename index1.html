<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil Estudiantes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>🎓 MÓDULO ESTUDIANTES</h1>
    </header>
    <section>
        <article>
            <form>
                <input type="text" placeholder="Nombre" required>
                <input type="number" placeholder="Edad">
                <input type="text" placeholder="TI">
                <select>
                    <option>Zona Norte</option>
                    <option>Zona Sur</option>
                </select>
                <select>
                    <option>7 AM</option>
                    <option>11 AM</option>
                    <option>3 PM</option>
                    <option>6 PM</option>
                </select>
                <button type="submit">GUARDAR ESTUDIANTE</button>
            </form>
        </article>
        <article>
            <h3>ESTUDIANTES REGISTRADOS</h3>
        </article>
        <article>
            <h3>TARJETAS DE RUTAS ACTIVAS</h3>
            <div id="dashboard"></div>
        </article>
    </section>
</body>

</html>
