<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil Estudiantes</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>
    <header>
        <h1>🎓 MÓDULO ESTUDIANTES</h1>
        <div id="widget-clima"
            style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 250px; background-color: #f0f8ff;">
            <h3 style="margin-top: 0; color: #333;">☁️ Clima Actual</h3>
            <div id="info-clima">Cargando información del clima...</div>
        </div>
    </header>
    <section>
        <article>
            <form id="7">
                <input type="text" id="1" placeholder="Nombre" required>
                <input type="number" id="2" placeholder="Edad" required>
                <input type="number" id="3" placeholder="TI" required>
                <select required id="4">
                    <option disabled selected>Elija su zona</option>
                    <option>Zona Norte</option>
                    <option>Zona Sur</option>
                    <option>Zona Este</option>
                    <option>Zona Oeste</option>
                    <option>Zona Oriente</option>
                    <option>Zona Occidente</option>
                    
                </select>
                <select id="5">
                    <option disabled selected>Elija su jornada</option>
                    <option>7 AM</option>
                    <option>9 AM</option>
                    <option>11 AM</option>
                    <option>1 PM</option>
                    <option>3 PM</option>
                    <option>6 PM</option>
                    <option>9 PM</option>
                </select>
                <button type="submit">GUARDAR ESTUDIANTE</button>
            </form>
        </article>
        <br>

        <section id="8" class="tarjetas">
            <h3>ESTUDIANTES REGISTRADOS</h3>
        </section>

        <article>
            <h3>TARJETAS DE RUTAS ACTIVAS</h3>
            <div id="contenedor-rutas">

            </div>
        </article>
    </section>
</body>
<script src="/JS/app1.js"></script>

</html>
