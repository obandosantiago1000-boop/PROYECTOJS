<!--<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Módulo de Rutas - Rutas Seguras Kids</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>
    <header>
        <h1>🗺️ MÓDULO RUTAS</h1>
        <div id="widget-clima"
            style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 250px; background-color: #f0f8ff;">
            <h3 style="margin-top: 0; color: #333;">☁️ Clima Actual</h3>
            <div id="info-clima">Cargando información del clima...</div>
        </div>
    </header>
    <section>
        <article>
            <h3>DESIGNAR RUTA</h3>
            <form id="form-ruta">
                <input type="text" id="nombre-ruta" placeholder="Nombre Ruta" required>
                <select id="select-conductor" required>
                    <option value="" disabled selected>Conductor</option>
                </select>
                <select id="zona-ruta" required>
                    <option>Zona Norte</option>
                    <option>Zona Sur</option>
                    <option>Zona Este</option>
                    <option>Zona Oeste</option>
                    <option>Zona Oriente</option>
                    <option>Zona Occidente</option>
                </select>
                <select id="jornada-ruta" required>
                    <option>7 AM</option>
                    <option>9 AM</option>
                    <option>11 AM</option>
                    <option>1 PM</option>
                    <option>3 PM</option>
                    <option>6 PM</option>
                    <option>9 PM</option>
                </select>
                <button type="submit">CREAR RUTA</button>
            </form>

        </article>
        <h3>CONDUCTORES</h3>
        <section id="contenedor-conductores" class="card">
        </section>
        <H3>ESTUDIANTES</H3>
        <section id="contenedor-estudiantes" class="card">
        </section>

        <BR></BR>
        <article>
            <h3>TARJETAS DE RUTAS ACTIVAS</h3>
            <div id="dashboard"></div>
        </article>
    </section>
</body>
<script src="/JS/app3.js"></script>

</html>
