<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Módulo de Rutas - Rutas Seguras Kids</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>🗺️ MÓDULO RUTAS</h1>
    </header>
    <section>
        <article>
            <h3>DESIGNAR RUTA</h3>
            <form id="form-ruta">
                <input type="text" placeholder="Nombre de la ruta" required>
                <select>
                    <option>Zona Norte</option>
                    <option>Zona Sur</option>
                </select>
                <select>
                    <option>Seleccionar Conductor:</option>
                    <option>Juan Pérez (Cédula: 12.345...)</option>
                </select>
                <select>
                    <option>7 AM</option>
                    <option>11 AM</option>
                    <option>3 PM</option>
                    <option>6 PM</option>
                </select>
                <button type="submit">DESIGNAR RUTA</button>
            </form>
        </article>

        <article>
            <h3>CONDUCTORES</h3>
        </article>
        <article>
            <h3>ESTUDIANTES</h3>
        </article>

        <article>
            <h3>TARJETAS DE RUTAS ACTIVAS</h3>
            <div id="dashboard"></div>
        </article>
    </section>
</body>

</html>
